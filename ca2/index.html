<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Solar System</title>

    <!-- Load the correct CSS -->
    <link rel="stylesheet" href="stylesheet.css">
</head>

<body>

<div class="corner-sun-wrapper">
    <div class="corner-sun"></div>
</div>

<h1 class="title">THE S<span class="solar-o">O</span>LAR SYSTEM</h1>

<div class="solar-system">

    <div class="stars1"></div>
    <div class="stars2"></div>
    <div class="stars3"></div>

    <div class="sun"></div>

    <div class="planet-wrapper" data-planet="mercury">
        <div class="planet mercury"></div>
        <div class="planet-label">MERCURY</div>
    </div>

    <div class="planet-wrapper" data-planet="venus">
        <div class="planet venus"></div>
        <div class="planet-label">VENUS</div>
    </div>

    <div class="planet-wrapper" data-planet="earth">
        <div class="planet earth"></div>
        <div class="planet-label">EARTH</div>
    </div>

    <div class="planet-wrapper" data-planet="mars">
        <div class="planet mars"></div>
        <div class="planet-label">MARS</div>
    </div>

    <div class="planet-wrapper" data-planet="jupiter">
        <div class="planet jupiter"></div>
        <div class="planet-label">JUPITER</div>
    </div>

    <div class="planet-wrapper" data-planet="saturn">
        <div class="planet saturn"></div>
        <div class="planet-label">SATURN</div>
    </div>

    <div class="planet-wrapper" data-planet="uranus">
        <div class="planet uranus"></div>
        <div class="planet-label">URANUS</div>
    </div>

    <div class="planet-wrapper" data-planet="neptune">
        <div class="planet neptune"></div>
        <div class="planet-label">NEPTUNE</div>
    </div>

</div>

<!-- FORCE LOAD THE NEW JS -->
<script src="script.js?v=999999"></script>

</body>
</html>
