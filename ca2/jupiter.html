<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Planet: JUPITER</title>
    <link rel="stylesheet" href="planet.css">

    <!-- JUPITER BACKGROUND THEME -->
    <style>
    body {
        background: radial-gradient(circle at center,
            #d47a2a 0%,     /* warm orange */
            #a85a1f 35%,    /* deep burnt orange */
            #5c2f14 65%,    /* dark brown */
            #000814 100%    /* space navy */
        );
    }
    </style>
</head>

<body class="cold-planet">

<div class="shimmer-overlay"></div>    
    
<!-- HOME ASTRONAUT BUTTON -->
<a href="index.html" class="home-astronaut">
    <img src="astronaut.png" alt="Home">
</a>

<div id="sparkle-container"></div>

<p class="fly-home-label">Back</p>

<h1 class="planet-title">JUPITER</h1>

<div class="planet-container">
    <div class="planet-info">

        <!-- RELATIVE SIZE -->
        <h2>Relative Size to Earth</h2>

        <div class="size-comparison">
            <div class="size-row">
                <div class="planet-circle earth-circle"></div>
                <div class="planet-circle target-planet-circle jupiter-circle"></div>
            </div>

            <input type="range" min="0" max="100" value="0" class="size-slider">
            <p class="size-label">Slide to compare sizes</p>
        </div>


<!-- RELATIVE DISTANCE -->
<h2>Relative Distance from the Sun (5.20 AU)</h2>

<div class="distance-container">
    <div class="sun-icon"></div>

    <div class="beam-track">
        <div class="beam-fill"></div>
    </div>

    <div class="planet-endpoint jupiter-endpoint"></div>
</div>


<h2>Mean Temperature</h2>

<div class="temperature-wrapper">
    <div class="temperature-number" id="tempNumber">0°C</div>

    <div class="temperature-bar">
        <div class="temperature-fill"></div>
    </div>
</div>



<!-- ASTRONAUT ANIMATION -->
<script>
const astro = document.querySelector(".home-astronaut");
const sparkles = document.getElementById("sparkle-container");

function spawnSparkle(x, y) {
  const s = document.createElement("div");
  s.classList.add("sparkle");
  s.style.left = x + "px";
  s.style.top = y + "px";
  sparkles.appendChild(s);
  setTimeout(() => s.remove(), 800);
}

function randomPoint() {
  return {
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight
  };
}

function bezier(t, p0, p1, p2, p3) {
  const cX = 3 * (p1.x - p0.x);
  const bX = 3 * (p2.x - p1.x) - cX;
  const aX = p3.x - p0.x - cX - bX;

  const cY = 3 * (p1.y - p0.y);
  const bY = 3 * (p2.y - p1.y) - cY;
  const aY = p3.y - p0.y - cY - bY;

  return {
    x: aX * t * t * t + bX * t * t + cX * t + p0.x,
    y: aY * t * t * t + bY * t * t + cY * t + p0.y
  };
}

astro.addEventListener("click", function(e) {
  e.preventDefault();

  let duration = 3000;
  let start = performance.now();

  const p0 = { x: 20, y: 80 };
  const p1 = randomPoint();
  const p2 = randomPoint();
  const p3 = { x: -300, y: Math.random() * window.innerHeight };

  function animate(now) {
    let t = (now - start) / duration;
    if (t > 1) t = 1;

    const pos = bezier(t, p0, p1, p2, p3);
    const next = bezier(Math.min(t + 0.01, 1), p0, p1, p2, p3);

    const angle = Math.atan2(next.y - pos.y, next.x - pos.x) * 180 / Math.PI;

    astro.style.transform = `translate(${pos.x}px, ${pos.y}px) rotate(${angle}deg)`;

    spawnSparkle(pos.x + 50, pos.y + 50);

    if (t < 1) {
      requestAnimationFrame(animate);
    } else {
      window.location.href = "index.html";
    }
  }

  requestAnimationFrame(animate);
});
</script>

<!-- SIZE SLIDER SCRIPT -->
<script>
const slider = document.querySelector(".size-slider");
const targetPlanet = document.querySelector(".target-planet-circle");

// Jupiter relative size (11.21x Earth)
const jupiterScale = 11.21;

// Cap the maximum displayed size
const maxDisplaySize = 300; 
const minDisplaySize = maxDisplaySize / jupiterScale;

slider.addEventListener("input", () => {
  const t = slider.value / 100;

  const size = minDisplaySize + (maxDisplaySize - minDisplaySize) * t;

  targetPlanet.style.width = `${size}px`;
  targetPlanet.style.height = `${size}px`;
});
</script>


<script>
// Elements
const beam = document.querySelector(".beam-fill");
const track = document.querySelector(".beam-track");

function animateBeam() {
  beam.style.opacity = "1";
  beam.style.width = "100%";
}

const observer = new IntersectionObserver(entries => {
  if (entries[0].isIntersecting) {
    animateBeam();
  }
});

observer.observe(track);
</script>

<script>
// Jupiter temperature
const jupiterTemp = -110;

const tempNumber = document.getElementById("tempNumber");
const tempFill = document.querySelector(".temperature-fill");

const tempObserver = new IntersectionObserver(entries => {
  if (entries[0].isIntersecting) {

    const duration = 2000;
    const start = performance.now();

    function updateNumber(now) {
      const progress = Math.min((now - start) / duration, 1);
      const value = Math.floor(progress * jupiterTemp);
      tempNumber.textContent = value + "°C";

      if (progress < 1) requestAnimationFrame(updateNumber);
    }

    requestAnimationFrame(updateNumber);

    tempFill.style.width = "100%";
  }
});

tempObserver.observe(document.querySelector(".temperature-wrapper"));
</script>

</body>
</html>
